<header class="site-header">
  <div class="site-header-inner">
    <a href="{{ "/" | relURL }}" class="site-wordmark">
      <span class="owl-mark" style="width:22px;height:22px;" aria-hidden="true">
        <span class="owl-layer owl-layer-body"></span>
        <span class="owl-layer owl-layer-eyes"></span>
      </span>
      <span class="site-wordmark-name">{{ .Site.Params.author }}</span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
      <button class="search-toggle" onclick="openSearch()" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="theme-toggle-icon sun">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3"/>
          </svg>
        </span>
        <span class="theme-toggle-icon moon">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 9.5A5.5 5.5 0 116.5 2.5a4.5 4.5 0 007 7z"/>
          </svg>
        </span>
        <span class="theme-toggle-thumb"></span>
      </button>
    </nav>
  </div>
</header>

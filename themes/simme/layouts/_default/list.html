{{ define "main" }}
{{ .Content }}
<div class="post-list">
  {{ range (.Pages.ByDate.Reverse.GroupByDate "2006") }}
  <div class="post-year-group">
    <h2 class="post-year">{{ .Key }}</h2>
    {{ range .Pages }}
    <div class="post-row">
      <a href="{{ .Permalink }}" class="post-row-title">{{ .Title }}</a>
      <div class="post-row-meta"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:0.25rem"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>{{ .Date.Format "Jan 02" }} &middot; <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:0.25rem"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>{{ .ReadingTime }} min read</div>
      {{ with .GetTerms "tags" }}<div class="post-row-tags">{{ range . }}<a href="{{ .Permalink }}" class="tag">{{ .LinkTitle }}</a>{{ end }}</div>{{ end }}
    </div>
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}

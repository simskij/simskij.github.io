{{ define "main" }}
<article>
  <div class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ with .Date }}{{ .Format "2006-01-02" }} &middot; {{ end }}{{ .WordCount }} words &middot; {{ .ReadingTime }} min read
    </div>
    {{ with .GetTerms "tags" }}
    <div class="post-tags">
      {{ range . }}<a href="{{ .Permalink }}" class="tag">{{ .LinkTitle }}</a>{{ end }}
    </div>
    {{ end }}
  </div>
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}

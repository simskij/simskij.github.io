<div id="particles" style="width:100%;height:100%;"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
  function initParticles() {
    var style = getComputedStyle(document.documentElement);
    var ink = style.getPropertyValue('--ink').trim();
    var paper = style.getPropertyValue('--paper').trim();
    document.getElementById('particles').style.background = paper;
    if (window.pJSDom && window.pJSDom.length) {
      window.pJSDom[0].pJS.fn.vendors.destroypJS();
      window.pJSDom = [];
    }
    particlesJS('particles', {
      "particles": {
        "number": { "value": 308, "density": { "enable": true, "value_area": 1341.57 } },
        "color": { "value": ink },
        "shape": { "type": "circle", "stroke": { "width": 1, "color": ink }, "polygon": { "nb_sides": 5 } },
        "opacity": { "value": 0.5, "random": false, "anim": { "enable": false, "speed": 1, "opacity_min": 0.1, "sync": false } },
        "size": { "value": 0, "random": true, "anim": { "enable": false, "speed": 40, "size_min": 0.1, "sync": false } },
        "line_linked": { "enable": true, "distance": 150, "color": ink, "opacity": 0.4, "width": 1 },
        "move": { "enable": true, "speed": 0, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false, "attract": { "enable": true, "rotateX": 600, "rotateY": 1200 } }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
        "modes": {
          "grab": { "distance": 167.82, "line_linked": { "opacity": 1 } },
          "bubble": { "distance": 400, "size": 40, "duration": 2, "opacity": 8, "speed": 3 },
          "repulse": { "distance": 200, "duration": 0.4 },
          "push": { "particles_nb": 4 },
          "remove": { "particles_nb": 2 }
        }
      },
      "retina_detect": true
    });
  }

  initParticles();

  new MutationObserver(initParticles).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme']
  });
</script>

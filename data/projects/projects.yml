projects:
  - title: simskij/awesome-software-architecture
    url: https://github.com/simskij/awesome-software-architecture
    description: >
      A curated list of resources on software architecture and related practices. To quote the repository readme:

      > Software architecture aims to describe the high level structures of software as well as the discipline of
      > creating them. As this topic is pretty broad, it might contain resources also present in more niche lists.

  - title: containrrr/shoutrrr
    url: https://github.com/containrrr/shoutrrr
    description: >
      Shoutrrr is a notification package for go applications, heavily inspired by the python library 
      [caronc/apprise](https://github.com/caronc/apprise). It is also usable as a standalone CLI tool.

  - title: containrrr/watchtower
    url: https://github.com/containrrr/watchtower
    description: >
      Watchtower is currently the most popular solution for automating the updates of base images for 
      docker containers. The project is written exclusively in Go. Maintained through the Containrrr team.